apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: lunchdrop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: registry.local:5000/lunchdrop-frontend:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: lunchdrop
spec:
  selector:
    app: frontend
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lunchdrop-ingress
  namespace: lunchdrop
  annotations:
    kubernetes.io/ingress.class: traefik   # k3s ใช้ traefik by default
spec:
  rules:
  - host: lunch.local                       # ← เปลี่ยนเป็น domain ของคุณ
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
