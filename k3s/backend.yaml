apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: lunchdrop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: registry.local:5000/lunchdrop-backend:latest
        env:
        - name: DB_HOST
          value: postgres
        - name: DB_NAME
          value: lunchdrop
        - name: DB_USER
          value: postgres
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: lunchdrop-secret
              key: DB_PASSWORD
        - name: ADMIN_KEY
          valueFrom:
            secretKeyRef:
              name: lunchdrop-secret
              key: ADMIN_KEY
        - name: NODE_ENV
          value: production
        ports:
        - containerPort: 4000
        livenessProbe:
          httpGet:
            path: /api/health
            port: 4000
          initialDelaySeconds: 15
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: lunchdrop
spec:
  selector:
    app: backend
  ports:
  - port: 4000
    targetPort: 4000
